<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="signup.css" />
</head>
<body>

    <!-- BACKGROUND -->
    <div class="bg-hero"></div>
    <div class="bg-grid"></div>

    <!-- BACK TO HOME BUTTON -->
    <a href="index.html" class="back-home" id="backHomeBtn">
        <i class="fas fa-chevron-left"></i>
        <span>Home</span>
    </a>

    <!-- MAIN CARD -->
    <main>
        <div class="auth-wrap">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <div class="brand-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2>Create Account</h2>
                    <p>Join us and get started</p>
                </div>

                <!-- Signup Form -->
                <form id="signupForm" novalidate>
                    <!-- Full Name -->
                    <div class="field-group">
                        <label class="field-label" for="signupName">Full Name</label>
                        <div class="field-wrap">
                            <i class="fas fa-user field-icon"></i>
                            <input type="text" id="signupName" placeholder="John Doe" required autofocus />
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="field-group">
                        <label class="field-label" for="signupUsername">Username</label>
                        <div class="field-wrap">
                            <i class="fas fa-user-tag field-icon"></i>
                            <input type="text" id="signupUsername" placeholder="johndoe" required />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="field-group">
                        <label class="field-label" for="signupEmail">Email Address</label>
                        <div class="field-wrap">
                            <i class="fas fa-envelope field-icon"></i>
                            <input type="email" id="signupEmail" placeholder="you@example.com" required />
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="field-group">
                        <label class="field-label" for="signupPassword">Password</label>
                        <div class="field-wrap">
                            <i class="fas fa-lock field-icon"></i>
                            <input type="password" id="signupPassword" placeholder="Min. 6 characters" required minlength="6" />
                            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="strength-meter" id="strengthMeter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <span class="strength-label" id="strengthLabel"></span>
                    </div>

                    <!-- Confirm Password -->
                    <div class="field-group">
                        <label class="field-label" for="signupConfirm">Confirm Password</label>
                        <div class="field-wrap">
                            <i class="fas fa-shield-halved field-icon"></i>
                            <input type="password" id="signupConfirm" placeholder="Repeat your password" required />
                            <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Toggle confirm">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Role Selection -->
                    <div class="field-group">
                        <label class="field-label" for="signupRole">Select Role</label>
                        <div class="field-wrap">
                            <i class="fas fa-user-tag field-icon"></i>
                            <select id="signupRole" required>
                                <option value="">Choose a role</option>
                                <option value="admin">Admin</option>
                                <option value="viewer">Viewer</option>
                            </select>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="terms-row">
                        <label class="custom-check">
                            <input type="checkbox" id="agreeTerms" required />
                            <span class="check-box"><i class="fas fa-check"></i></span>
                            <span class="check-label">I agree to the <a href="404.html">Terms of Service</a> and <a href="404.html">Privacy Policy</a></span>
                        </label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-submit">
                        Create Account <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="auth-error" id="signupError"></div>
                    <div class="auth-success" id="signupSuccess"></div>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Buttons -->
             <a href="404.html" class="social-btn google">
    <i class="fab fa-google"></i>
    <span>Google</span>
</a>
<a href="404.html" class="social-btn github">
    <i class="fab fa-github"></i>
    <span>GitHub</span>
</a>

                <!-- Footer with working Sign In link -->
                <p class="auth-footer">
                    Already have an account? <a href="login.html" id="loginLink">Sign In</a>
                </p>
            </div>
        </div>
    </main>

    <script src="signup.js"></script>
</body>
</html>
